name: Match Lifecycle Cron
on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes (responsive but efficient)
  workflow_dispatch: 

jobs:
  cron_triggers:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Match Sync & Transitions
        run: |
          curl -X GET "https://worldcup-sand-eight.vercel.app/api/cron/sync" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          
      - name: Trigger Arena Position Reveal
        run: |
          curl -X GET "https://worldcup-sand-eight.vercel.app/api/cron/reveal" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          
      - name: Trigger Match Settlement
        run: |
          curl -X GET "https://worldcup-sand-eight.vercel.app/api/cron/settle" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
